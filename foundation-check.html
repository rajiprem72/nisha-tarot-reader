<!DOCTYPE html>
<html>

<head>
<title>15 Days Tarot Foundation Course</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:15px;
}

.container{
  max-width:800px;
  margin:auto;
  font-size:28px;
}
    
input{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:24px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:24px;
  cursor:pointer;
}

.card{
  border:1px solid #ccc;
  padding:15px;
  margin-top:20px;
  display:none;
  width:100%;
  overflow-wrap:break-word;
}
.p{
  font-size:24px;
}
</style>
</head>

<body>
<div class="container">
<h2>15 Days Tarot Foundation Course</h2>

<p>
Enter your Participant ID.
If you don't know it, please check your Email.
</p>

<input
type="text"
id="participantId"
placeholder="Enter Participant ID">

<button onclick="searchParticipant()">
Submit
</button>

<div id="details" class="card"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwMK9Er-4VAW96cRc4wOpDZ2JBitfsxkvLAecweZ4skh9uZeiiPprguGiQUOIgsu7i6Lg/exec";

function searchParticipant(){


const participantId =
document.getElementById("participantId").value;

fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
        action:"findParticipant",
        participantId:participantId
    })
})
.then(r => r.json())
.then(data => {

    console.log(data);

    if(!data.success){
        alert("Participant ID not found");
        return;
    }

    let p = data.participant;

    document.getElementById("details").style.display="block";

    document.getElementById("details").innerHTML=`

    <h3>Verify Your Details</h3>

    <p><b>Name:</b> ${p["Full Name"]}</p>
    <p><b>Gender:</b> ${p["Gender"]}</p>
    <p><b>Mobile:</b> ${p["Mobile Number"]}</p>
    <p><b>WhatsApp:</b> ${p["WhatsApp Number"]}</p>
    <p><b>Email:</b> ${p["Email"]}</p>
    <p><b>Age:</b> ${p["Age"]}</p>
    <p><b>Profession:</b> ${p["Profession"]}</p>
    <p><b>State:</b> ${p["State"]}</p>

    <button onclick="payNow(
    '${p["Participant ID"]}',
    '${p["Full Name"]}'
    )">
    Join 15 Days Tarot Foundation Course - Pay ₹7000
    </button>
    `;
})
.catch(err => {
    console.error(err);
    alert(err);
});


}

function payNow(participantId,fullName){

var options = {

    key: "rzp_live_SxjzwcAJLI0SlC",

    amount:700000,

    currency:"INR",

    name:"Tarot Shakti by Nisha",

    description:"15 Days Tarot Foundation Course",

    image:"https://yourdomain.com/logo.png",

    prefill:{
        name:fullName,
        email:p["Email"],
        contact:p["Mobile Number"]
    },

    notes:{
        participantId:participantId
    },

    theme:{
        color:"#3399cc"
    },

    modal:{
        backdropclose:false,
        escape:false
    },

    config:{
        display:{
            language:"en"
        }
    },

    handler: function (response) {

        saveFoundationPayment(
            participantId,
            fullName,
            response.razorpay_payment_id
        );

    },

    notes: {
        participantId: participantId
    },

    theme: {
        color: "#3399cc"
    }
};

var rzp = new Razorpay(options);

rzp.open();

}

function saveFoundationPayment(
participantId,
fullName,
paymentId
)
{
fetch(API_URL,{
method:"POST",
body:JSON.stringify({


        action:"saveFoundationPayment",

        participantId:participantId,

        fullName:fullName,

        paymentId:paymentId,
        //actual amount
        amount:7000
        // test amount
        //amount =100;

    })
})
.then(r=>r.json())
.then(data=>{

    if(data.success)
    {
        alert(
        "Payment Successful. Welcome to the 15 Days Tarot Foundation Course."
        );

        location.href =
        "foundation-success.html";
    }
    else
    {
        alert(
        "Payment received but save failed. Please contact support."
        );
    }

});


}
</script>
</div>    
</body>
</html>
