<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Registration</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

.container{
    max-width:900px;
    margin:0 auto 50px;
    background:transparent;
    padding:0 20px;
    box-shadow:none;
}

h1{
    text-align:center;
    color:#4b006e;
}

.subheading{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    font-size:32px;
}

input, select{
    width:100%;
    height:78px;
    padding:0 20px;
    font-size:28px;
    border:1px solid #999;
    border-radius:5px;
    box-sizing:border-box;
}

.submit-btn{
    width:100%;
    border:none;
    border-radius:6px;
    cursor:pointer;
    padding:30px 20px;
    color:white;
    background:linear-gradient(
        90deg,
        #f05c9d,
        #9c27b0
    );
    font-weight:bold;
    text-align:center;
}

.submit-btn:hover{
    background:#e68900;
}

.note{
    margin-top:20px;
    text-align:center;
    color:#666;
}

.success{
    display:none;
    margin-top:20px;
    background:#d4edda;
    color:#155724;
    padding:15px;
    border-radius:5px;
    text-align:center;
}
/* WORKSHOP HEADER */

.workshop-header{
    text-align:center;
    padding:25px 20px 40px;
    background:#ebe8e3;
}

.workshop-header h3{
    font-size:54px;
    font-weight:700;
    color:#000;
    margin:0 0 25px;
    line-height:1.2;
}

.workshop-header h2{
    margin:0 0 35px;
    font-size:52px;
    color:#000;
}

.workshop-header h2 strong{
    font-weight:800;
}

.workshop-header h2 span{
    font-weight:400;
}

.progress-bar{
    width:90%;
    max-width:1000px;
    height:45px;
    margin:0 auto 50px;
    background:#f1f1f1;
    border-radius:8px;
    overflow:hidden;
    border:1px solid #d6d6d6;
    box-shadow:0 2px 12px rgba(0,0,0,0.15);
}

.progress-fill{
    width:80%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:22px;

    background:
    repeating-linear-gradient(
    -45deg,
    #f1b44c 0px,
    #f1b44c 20px,
    #e8a843 20px,
    #e8a843 40px
    );
}

.event-title{
    font-size:68px;
    font-weight:800;
    color:#6a0dad;
    margin-bottom:15px;
}

.event-date{
    font-size:58px;
    font-weight:800;
    color:#000;
    margin-bottom:20px;
}
</style>
</head>

<body>
<div class="workshop-header">

    <h3>
        Special Live Workshop
    </h3>

    <h2>
        <strong>Almost done..</strong>
        <span>Please enter your details below!</span>
    </h2>

    <div class="progress-bar">
        <div class="progress-fill">
            80%
        </div>
    </div>

    <div class="event-title">
        Exclusive 1 Day Workshop
    </div>

    <div class="event-date">
        5 July 2026 | 10 AM
    </div>

</div>


    
<div class="container">
  
<form id="registrationForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="fullname" required>
</div>

<div class="form-group">
<label>Gender</label>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>    

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" id="mobile" required>
</div>

<div class="form-group">
<label>Whatsapp Number</label>
<input type="tel" id="whatsapp" required>
</div>    

<div class="form-group">
<label>Email ID</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age" min="18" max="100" required>
</div>

<div class="form-group">
<label>Profession</label>

<select id="profession" required>

<option value="">Select Profession</option>

<option>Student</option>

<option>Working Professional</option>

<option>Business Owner</option>

<option>Homemaker</option>

<option>Retired</option>

<option>Others</option>

</select>
</div>

<div class="form-group">
<label>Place</label>
<select id="state" name="state" required>
<option value="">Select State / Union Territory</option>

<optgroup label="States">
<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>
</optgroup>

<optgroup label="Union Territories">
<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi (NCT)</option>
<option>Jammu and Kashmir</option>
<option>Ladakh</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
</optgroup>

</select>    
</div>
    
<button type="submit" class="submit-btn">

    <div style="font-size:40px;font-weight:bold;">
        Register Now For Rs.11/- Only
    </div>

    <div style="font-size:18px;margin-top:8px;">
        LIMITED SEATS ONLY
    </div>

</button>

</form>

<div class="success" id="successMessage">
Thank You! Your registration has been received.<br>
Payment integration will be added in the next phase.
</div>

<p class="note">
Your details are kept confidential.
</p>

</div>

<script>

document.getElementById("registrationForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const payload = {

        action:"register",

        fullname:
        document.getElementById("fullname").value,

        gender:
        document.getElementById("gender").value,

        mobile:
        document.getElementById("mobile").value,

        whatsapp:
        document.getElementById("whatsapp").value,

        email:
        document.getElementById("email").value,

        age:
        document.getElementById("age").value,

        profession:
        document.getElementById("profession").value,

        place:
        document.getElementById("state").value
    
    };

  const form =
document.createElement("form");

form.method = "POST";

form.action =
"https://script.google.com/macros/s/AKfycbwMK9Er-4VAW96cRc4wOpDZ2JBitfsxkvLAecweZ4skh9uZeiiPprguGiQUOIgsu7i6Lg/exec";

const input =
document.createElement("input");

input.type = "hidden";

input.name = "data";

input.value =
JSON.stringify(payload);

form.appendChild(input);

document.body.appendChild(form);

form.submit();
    
</script>
</body>
</html>
