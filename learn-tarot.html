<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Learn Tarot Reading</title>

<style>

body{

    padding:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
}

.hero-image{

}
