<!DOCTYPE html>
<html>
<head>
<title>Payment Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:15px;
}

.container{
  max-width:800px;
  margin:auto;
}
.h2{
 font-size:32px;
}
.p{
 font-size:28px;
}
  
input{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}

.card{
  border:1px solid #ccc;
  padding:15px;
  margin-top:20px;
  display:none;
  width:100%;
  overflow-wrap:break-word;
}

</style>
  
</head>
<body>
<div class="container">
<h2>Payment Successful</h2>

<p>
Please wait...
</p>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwMK9Er-4VAW96cRc4wOpDZ2JBitfsxkvLAecweZ4skh9uZeiiPprguGiQUOIgsu7i6Lg/exec";

/*
Normally Razorpay passes payment_id
through webhook.

For demo:
*/

const paymentId =
new URLSearchParams(
window.location.search
).get("payment_id");

fetch(
API_URL,
{
method:"POST",
body:new URLSearchParams({

action:"saveFoundationPayment",

participantId:
localStorage.getItem("participantId"),

fullName:
localStorage.getItem("fullName"),

paymentId:
paymentId

})
}
)
.then(r=>r.json())
.then(data=>{

document.body.innerHTML=`
<h2>Thank You</h2>
<p>
Your registration for the
15 Days Tarot Foundation Course
has been completed successfully.
</p>
`;

});

</script>
</div>
</body>
</html>
