<!DOCTYPE html>
<html>
<head>
<title>Payment Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:15px;
}

.container{
  max-width:800px;
  margin:auto;
}
h2{
    font-size:48px;
    font-weight:bold;
    text-align:center;
    color:#008000;
    margin-bottom:20px;
}

p{
    font-size:34px;
    font-weight:bold;
    text-align:center;
    line-height:1.6;
    color:#333;
}
  
input{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}

.card{
  border:1px solid #ccc;
  padding:15px;
  margin-top:20px;
  display:none;
  width:100%;
  overflow-wrap:break-word;
}

</style>
  
</head>
<body>
<div class="container">
<h2>Payment Successful</h2>

<p>
Please wait...
</p>
</div>
<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwMK9Er-4VAW96cRc4wOpDZ2JBitfsxkvLAecweZ4skh9uZeiiPprguGiQUOIgsu7i6Lg/exec";

/*
Normally Razorpay passes payment_id
through webhook.

For demo:
*/

const paymentId =
new URLSearchParams(
window.location.search
).get("payment_id");

fetch(
API_URL,
{
method:"POST",
body:new URLSearchParams({

action:"saveFoundationPayment",

participantId:
localStorage.getItem("participantId"),

fullName:
localStorage.getItem("fullName"),

paymentId:
paymentId

})
}
)
.then(r=>r.json())
.then(data=>{

document.body.innerHTML = `
<div style="
    max-width:800px;
    margin:40px auto;
    text-align:center;
    font-family:Arial,sans-serif;
    padding:20px;
">

<h2 style="
    font-size:48px;
    font-weight:bold;
    color:#008000;
    margin-bottom:30px;
">
🎉 Payment Successful
</h2>

<p style="
    font-size:34px;
    font-weight:bold;
    line-height:1.6;
    color:#333;
">
Thank You!<br><br>

Your registration for the<br>

<b>15 Days Tarot Foundation Course</b><br>

has been completed successfully.
</p>

<p style="
    font-size:26px;
    color:#666;
    margin-top:40px;
">
Our team will contact you shortly with further instructions.
</p>

</div>
`;
});

</script>
</div>
</body>
</html>
